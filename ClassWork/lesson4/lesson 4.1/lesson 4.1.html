<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<!--Якщо файл скачений-->
<video src="Additional-materials/Disney.mp4" controls muted loop poster="https://upload.wikimedia.org/wikipedia/commons/6/64/Disney%2B_2024.svg"></video>
<!--Відео відтворюється самостійно autoplay-->
<!--більшість браузерів не запускає відео якщо воно не muted(без звуку)-->
<!--щоб контролювати відео самостійно  використовуємо controls-->
<!--щоб відео ішло циклічно loop-->
<!--Також до відео можемо додати превьюшку (постер якій відображається спочатку )
Через "poster" вказуємо картинку яку бажаємо додати. постер буде відображатись поки відео не поснеться тому прибираємо autoplay-->

<!--Якщо михочемо застосувати якесь аудіо-->
<audio src=""></audio>
</body>
</html>
